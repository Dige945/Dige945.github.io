---
layout: compress
---

<!doctype html>
<html lang="{{ site.locale | default: 'en-US' | slice: 0, 2 }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title and page.title != "" %}{{ page.title }} - {% endif %}{{ site.title | default: site.name }}</title>
    <meta name="description" content="{{ site.description | default: site.name | strip_html | strip_newlines | escape }}">
    <link rel="icon" type="image/jpeg" href="{{ '/images/profile.jpg' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/images/profile.jpg' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/home.css' | relative_url }}">
  </head>
  <body>
    <main class="home-shell" role="main">
      {{ content }}
    </main>
    <footer class="home-footer">
      <span class="home-footer__stats" id="busuanzi_container_site_pv">
        <span class="home-footer__label">Visited by</span>
        <strong id="busuanzi_value_site_uv">...</strong>
        <span>people</span>
        <span class="home-footer__separator" aria-hidden="true"></span>
        <strong id="busuanzi_value_site_pv">...</strong>
        <span>views</span>
      </span>
    </footer>
    <script src="{{ '/assets/js/home.js' | relative_url }}"></script>
    <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
  </body>
</html>
